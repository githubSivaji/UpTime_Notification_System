server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:uptime_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: my-super-secret-key-change-this-in-production-very-secure-key-123456
  access-token-expiration: 900000
  refresh-token-expiration: 604800000